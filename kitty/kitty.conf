
# Custom Nord-Blue Transparent Theme
font_family      JetBrainsMono Nerd Font Mono
font_size        12

# Nord-inspired colors (polar night blues/grays)
background        #111A2C
foreground        #d8dee9
cursor            #88c0d0
selection_background #5e81ac
color0            #3b4252   # black
color8            #4c566a   # bright black
color4            #81a1c1   # blue
color12           #88c0d0   # bright blue
color1            #bf616a   # red
color2            #a3be8c   # green
color3            #ebcb8b   # yellow
color5            #b48ead   # purple
color6            #8fbcbb   # cyan
color7            #eceff4   # white

# Transparency & blur
background_opacity 0.8
dynamic_background_opacity yes
macos_option_as_alt yes

# Tabs & padding (clean lines)
tab_bar_style     powerline
window_padding_width 8

# Keybinds
map ctrl+shift+t  new_tab
map ctrl+shift+Enter new_window
