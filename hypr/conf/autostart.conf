#AUTOSTART


exec-once = sleep 1 && waybar
exec-once = swaync
exec-once = awww-daemon & sleep 0.5 & awww init
exec-once = nm-applet --indicator

# Setup fcitx5
exec-once = export GTK_IM_MODULE=fcitx5
exec-once = export QT_IM_MODULE=fcitx5
exec-once = export XMODIFIERS=@im=fcitx5
exec-once = export INPUT_METHOD=fcitx5
exec-once = export SDL_IM_MODULE=fcitx5
exec-once = fcitx5
exec-once = kclockd
exec-once = notion-calendar

# Setup screen sharing
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Setup clipboard — wipe history on each login so it starts fresh
exec-once = cliphist wipe
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Setup themes
exec-once = ~/.config/auvry/gtkthemes.sh
