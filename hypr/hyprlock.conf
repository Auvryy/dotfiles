background {
    path = /home/andy/.config/wallpapers/wallpaper-015.png
    blur_passes = 1
    blur_size = 2
    brightness = 0.9
}

# Time
label {
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(D9E0EEFF)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 180
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(0,0,0,0.5)
}

# Date
label {
    text = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color = rgba(CDD6F4CC)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgba(0,0,0,0.4)
}

# Password input field
input-field {
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_space = 0.4
    dots_center = true
    outer_color = rgba(89B4FACC)
    inner_color = rgba(1E1D2FCC)
    font_color = rgba(D9E0EEFF)
    fade_on_empty = true
    placeholder_text = <span foreground="##CDD6F4">  Enter Password</span>
    hide_input = false
    rounding = 12
    check_color = rgba(A6E3A1FF)
    fail_color = rgba(F38BA8FF)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_transition = 300
    position = 0, -30
    halign = center
    valign = center
}

# Hint label
label {
    text =  Type to unlock
    color = rgba(6E6C7EFF)
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, -90
    halign = center
    valign = center
}
